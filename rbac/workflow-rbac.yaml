apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-role
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-rolebinding
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: workflow
    namespace: argo
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: workflow-role